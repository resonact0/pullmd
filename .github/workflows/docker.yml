name: Build and push Docker images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GHCR: ghcr.io
  NAMESPACE: aeternalabshq

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pullmd
            context: .
            dockerfile: ./Dockerfile
            readme: ./README.md
            short: "Self-hosted URL-to-Markdown service with stable, refreshable share links."
          - name: pullmd-trafilatura
            context: ./trafilatura-sidecar
            dockerfile: ./trafilatura-sidecar/Dockerfile
            readme: ./trafilatura-sidecar/README.md
            short: "Trafilatura HTML-to-Markdown extractor sidecar for PullMD."
          - name: pullmd-playwright
            context: ./playwright-sidecar
            dockerfile: ./playwright-sidecar/Dockerfile
            readme: ./playwright-sidecar/README.md
            short: "Headless Chromium renderer sidecar for PullMD — handles JavaScript-rendered pages."
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR }}/${{ env.NAMESPACE }}/${{ matrix.name }}
            ${{ env.NAMESPACE }}/${{ matrix.name }}
          # Tag plan during the v1 → v2 migration grace period:
          #   - vX.Y.Z tag push      → vX.Y.Z, X.Y, X
          #   - main push (untagged) → main, sha-<sha>
          #   - `latest` is intentionally PINNED to v1.2.x via the v1.2.x image
          #     in the registry. Neither tag pushes nor merges to main update
          #     it. Re-enable by uncommenting the type=raw line below once
          #     self-hosters have had time to migrate (≈ 2 weeks post-v2.0.0).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            # type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Sync Docker Hub README + short description
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.NAMESPACE }}/${{ matrix.name }}
          short-description: ${{ matrix.short }}
          readme-filepath: ${{ matrix.readme }}
