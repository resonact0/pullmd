services:
  pullmd:
    # Built from local source (this fork's server.js/lib changes — docling/
    # whisper engine routing — aren't in the published aeternalabshq/pullmd
    # image). Swap back to `image: aeternalabshq/pullmd:latest` (dropping
    # `build:`) if you ever want to run vanilla upstream instead.
    build:
      context: .
    image: anythingtomd-pullmd:local
    container_name: pullmd
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:${PORT:-3000}}
      - TRAFILATURA_URL=http://trafilatura:8001/extract
      - PLAYWRIGHT_URL=http://playwright:8002/render
      - MARKITDOWN_URL=http://markitdown:8003/convert
      - MARKITDOWN_YOUTUBE=${MARKITDOWN_YOUTUBE:-}
      # Opt-in high-quality/complex-document engine (?engine=docling) — MarkItDown
      # above stays the default converter; leave this unset to disable docling.
      - DOCLING_URL=${DOCLING_URL:-http://docling:8004/convert}
      # yt-dlp + Whisper media ingestion: fallback when a YouTube page has no
      # caption track, and the general entry point for non-YouTube video/audio
      # URLs (?media=whisper).
      - WHISPER_MEDIA_URL=${WHISPER_MEDIA_URL:-http://whisper:8005/media}
      # Media tier (image captioning, audio transcription) — handled by pullmd, not the sidecar.
      - PULLMD_VISION_API_KEY=${PULLMD_VISION_API_KEY:-}
      - PULLMD_VISION_BASE_URL=${PULLMD_VISION_BASE_URL:-}
      - PULLMD_VISION_MODEL=${PULLMD_VISION_MODEL:-}
      # Defaults to the self-hosted whisper sidecar below (any non-empty API key
      # works — it doesn't check it). Point at a paid provider instead by
      # overriding both PULLMD_STT_API_KEY and PULLMD_STT_BASE_URL in .env.
      - PULLMD_STT_API_KEY=${PULLMD_STT_API_KEY:-local}
      - PULLMD_STT_BASE_URL=${PULLMD_STT_BASE_URL:-http://whisper:8005/v1}
      - PULLMD_STT_MODEL=${PULLMD_STT_MODEL:-}
      - PULLMD_LLM_API_KEY=${PULLMD_LLM_API_KEY:-}
      - PULLMD_LLM_BASE_URL=${PULLMD_LLM_BASE_URL:-}
      # Opt-in PDF OCR tier (?pdf=ocr) — needs its OWN key, no PULLMD_LLM_* fallback.
      - PULLMD_PDF_OCR_API_KEY=${PULLMD_PDF_OCR_API_KEY:-}
      - PULLMD_PDF_OCR_BASE_URL=${PULLMD_PDF_OCR_BASE_URL:-}
      - PULLMD_PDF_OCR_MODEL=${PULLMD_PDF_OCR_MODEL:-}
      # Output shaping (v3): set PULLMD_SOURCE_HEADER=true to restore the legacy
      # "Source:" body header; PULLMD_FRONTMATTER_FIELDS limits frontmatter keys.
      - PULLMD_SOURCE_HEADER=${PULLMD_SOURCE_HEADER:-}
      - PULLMD_FRONTMATTER_FIELDS=${PULLMD_FRONTMATTER_FIELDS:-}
      # Outbound User-Agent overrides + custom site recipes (path inside the
      # container; ./data is mounted at /data).
      - PULLMD_USER_AGENT=${PULLMD_USER_AGENT:-}
      - PULLMD_UA_FEED_URL=${PULLMD_UA_FEED_URL:-}
      - PULLMD_SITE_RECIPES=${PULLMD_SITE_RECIPES:-}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-}
      - DISABLE_PUBLIC_HISTORY=${DISABLE_PUBLIC_HISTORY:-false}
      # Authentication (v2.0+) - see MIGRATION.md before changing on an existing instance.
      - PULLMD_AUTH_MODE=${PULLMD_AUTH_MODE:-disabled}
      - PULLMD_ADMIN_EMAIL=${PULLMD_ADMIN_EMAIL:-}
      - PULLMD_ADMIN_PASSWORD=${PULLMD_ADMIN_PASSWORD:-}
      # Legacy bearer token (single-admin mode only, deprecated; removed in v3).
      - PULLMD_AUTH_TOKEN=${PULLMD_AUTH_TOKEN:-}
      # OAuth 2.1 for MCP clients (claude.ai web, Claude Desktop) — opt-in, see README.
      - OAUTH_JWT_SECRET=${OAUTH_JWT_SECRET:-}
      - CACHE_DB=/data/cache.db
    volumes:
      - ./data:/data
    networks:
      - pullmd-internal
    depends_on:
      - trafilatura
      - playwright
      - markitdown
      - docling
      - whisper

  trafilatura:
    image: aeternalabshq/pullmd-trafilatura:latest
    container_name: pullmd-trafilatura
    restart: unless-stopped
    networks:
      - pullmd-internal

  playwright:
    image: aeternalabshq/pullmd-playwright:latest
    container_name: pullmd-playwright
    restart: unless-stopped
    networks:
      - pullmd-internal

  markitdown:
    image: aeternalabshq/pullmd-markitdown:latest
    container_name: pullmd-markitdown
    restart: unless-stopped
    # Hard memory bound: a decompression bomb only OOM-kills the sandboxed
    # conversion child, the container stays under this cap and recovers.
    mem_limit: ${MARKITDOWN_MEM_LIMIT:-1g}
    environment:
      - MARKITDOWN_YT_TIMECODES=${MARKITDOWN_YT_TIMECODES:-links}
      - MARKITDOWN_YT_CHUNK=${MARKITDOWN_YT_CHUNK:-30}
      - MARKITDOWN_YT_LANGS=${MARKITDOWN_YT_LANGS:-}
      - MARKITDOWN_YT_PROXY=${MARKITDOWN_YT_PROXY:-}
      # Per-conversion wall-clock timeout (s); 0 disables. The conversion runs
      # in a disposable child process so a timeout/OOM can't take the server down.
      - MARKITDOWN_CONVERT_TIMEOUT=${MARKITDOWN_CONVERT_TIMEOUT:-60}
      # Optional per-conversion address-space cap (MB); 0 = rely on mem_limit.
      - MARKITDOWN_MEM_LIMIT_MB=${MARKITDOWN_MEM_LIMIT_MB:-0}
    networks:
      - pullmd-internal

  # Opt-in high-quality/complex-document engine (layout-aware reading order,
  # table structure, OCR). Not published on Docker Hub yet — built locally.
  # Heavy image (torch + model weights); remove this block + unset DOCLING_URL
  # above if you don't need it.
  docling:
    build:
      context: ./docling-sidecar
    container_name: pullmd-docling
    restart: unless-stopped
    mem_limit: ${DOCLING_MEM_LIMIT:-4g}
    environment:
      - DOCLING_CONVERT_TIMEOUT=${DOCLING_CONVERT_TIMEOUT:-300}
      - DOCLING_MEM_LIMIT_MB=${DOCLING_MEM_LIMIT_MB:-0}
    networks:
      - pullmd-internal

  # Self-hosted media ingestion: faster-whisper (STT) + yt-dlp (audio download
  # for any yt-dlp-supported URL). Not published on Docker Hub yet — built
  # locally. Remove this block, unset WHISPER_MEDIA_URL above, and point
  # PULLMD_STT_* at a paid provider instead if you don't want a local model.
  whisper:
    build:
      context: ./whisper-sidecar
    container_name: pullmd-whisper
    restart: unless-stopped
    mem_limit: ${WHISPER_MEM_LIMIT:-2g}
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-}
      - WHISPER_TRANSCRIBE_TIMEOUT=${WHISPER_TRANSCRIBE_TIMEOUT:-600}
      - WHISPER_MEDIA_FETCH_TIMEOUT=${WHISPER_MEDIA_FETCH_TIMEOUT:-600}
      - WHISPER_MEDIA_MAX_DURATION_SECONDS=${WHISPER_MEDIA_MAX_DURATION_SECONDS:-5400}
      - WHISPER_MEDIA_MAX_BYTES=${WHISPER_MEDIA_MAX_BYTES:-314572800}
    volumes:
      # Model weights are downloaded from Hugging Face on first use; persist
      # them here so restarts don't re-download.
      - whisper-model-cache:/home/app/.cache
    networks:
      - pullmd-internal

networks:
  pullmd-internal:
    driver: bridge

volumes:
  whisper-model-cache:
